<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Barbearia Style</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Barbearia Style</h1>
        <nav>
            <a href="#">Início</a>
            <a href="#">Serviços</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <section class="banner">
        <h2>Seu corte, seu estilo</h2>
        <p>Os melhores cortes da cidade</p>
        <button>Agendar</button>
    </section>

    <section class="servicos">
        <h2>Serviços</h2>

        <div class="cards">
            <div class="card">
                <h3>Corte</h3>
                <p>R$ 30</p>
            </div>

            <div class="card">
                <h3>Barba</h3>
                <p>R$ 20</p>
            </div>

            <div class="card">
                <h3>Corte + Barba</h3>
                <p>R$ 45</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Barbearia Style</p>
    </footer>

</body>
</html>
